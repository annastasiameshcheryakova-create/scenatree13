<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>
    <a-scene webxr="requiredFeatures: hit-test, local-floor;">
        
        <a-assets>
            <a-asset-item id="model1" src="avatar.glb"></a-asset-item>
            <a-asset-item id="model2" src="glasses1.glb"></a-asset-item>
            <a-asset-item id="model3" src="glasses2.glb"></a-asset-item>
        </a-assets>

        <a-entity id="reticle" ar-hit-test="doHitTest: true" visible="false">
            <a-ring color="#00FF00" rotation="-90 0 0" radius-inner="0.08" radius-outer="0.12"></a-ring>
        </a-entity>

        <a-camera position="0 1.6 0"></a-camera>

        <script>
            const scene = document.querySelector('a-scene');
            const reticle = document.querySelector('#reticle');
            const models = ['#model1', '#model2', '#model3'];

            scene.addEventListener('select', () => {
                if (reticle.getAttribute('visible')) {
                    const el = document.createElement('a-entity');
                    const randomModel = models[Math.floor(Math.random() * models.length)];
                    
                    el.setAttribute('gltf-model', randomModel);
                    el.setAttribute('position', reticle.getAttribute('position'));
                    el.setAttribute('scale', '0.5 0.5 0.5');
                    scene.appendChild(el);
                }
            });
        </script>
    </a-scene>
</body>
</html>
