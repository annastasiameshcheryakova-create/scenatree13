<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Домашнее задание 13 - WebXR AR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    
    <script>
        // Регистрируем кастомный компонент для создания моделей при клике
        AFRAME.registerComponent('ar-spawner', {
            init: function () {
                const sceneEl = this.el;
                const reticle = document.querySelector('#reticle');
                
                // Массив с ID моделей, которые мы загрузили в <a-assets>
                const models = ['#avatar-model', '#glasses1-model', '#glasses2-model'];

                // В WebXR событие 'select' отвечает за нажатие на экран (триггер контроллера)
                sceneEl.addEventListener('select', () => {
                    // Модель создается только если мы в AR-режиме и прицел зафиксировал поверхность
                    if (reticle && reticle.getAttribute('visible')) {
                        const newElement = document.createElement('a-entity');
                        
                        // Выбираем случайную модель из нашего массива
                        const randomIndex = Math.floor(Math.random() * models.length);
                        const chosenModel = models[randomIndex];
                        
                        // Устанавливаем свойства новому объекту
                        newElement.setAttribute('gltf-model', chosenModel);
                        
                        // Копируем позицию прицела (куда указывает точка на поверхности)
                        const position = reticle.object3D.position;
                        newElement.setAttribute('position', `${position.x} ${position.y} ${position.z}`);
                        
                        // Задаем начальный масштаб. Если модели слишком большие или маленькие, подправь этот параметр
                        newElement.setAttribute('scale', '0.5 0.5 0.5'); 
                        
                        // Добавляем созданный объект на сцену
                        sceneEl.appendChild(newElement);
                    }
                });
            }
        });
    </script>
</head>
<body>

    <a-scene webxr="requiredFeatures: hit-test;" ar-spawner>
        
        <a-assets>
            <a-asset-item id="avatar-model" src="avatar.glb"></a-asset-item>
            <a-asset-item id="glasses1-model" src="glasses1.glb"></a-asset-item>
            <a-asset-item id="glasses2-model" src="glasses2.glb"></a-asset-item>
        </a-assets>

        <a-entity id="reticle" ar-hit-test="target: #reticle" visible="false">
            <a-ring color="#00FF00" rotation="-90 0 0" radius-inner="0.08" radius-outer="0.12"></a-ring>
        </a-entity>

        <a-camera position="0 1.6 0"></a-camera>
        
    </a-scene>

</body>
</html>
