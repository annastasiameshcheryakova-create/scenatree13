<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Домашнє завдання 13 - AR Spawner</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    
    <script>
        AFRAME.registerComponent('ar-spawner', {
            init: function () {
                const sceneEl = this.el;
                const reticle = document.querySelector('#reticle');
                const models = ['#avatar-model', '#glasses1-model', '#glasses2-model'];

                sceneEl.addEventListener('select', () => {
                    if (reticle && reticle.getAttribute('visible')) {
                        const newElement = document.createElement('a-entity');
                        const randomIndex = Math.floor(Math.random() * models.length);
                        
                        newElement.setAttribute('gltf-model', models[randomIndex]);
                        newElement.setAttribute('position', reticle.getAttribute('position'));
                        newElement.setAttribute('rotation', reticle.getAttribute('rotation'));
                        newElement.setAttribute('scale', '0.5 0.5 0.5'); 
                        
                        sceneEl.appendChild(newElement);
                    }
                });
            }
        });
    </script>
</head>
<body>

    <a-scene 
        webxr="requiredFeatures: hit-test, local-floor;" 
        ar-mode-ui="enabled: true"
        ar-spawner>
        
        <a-assets timeout="10000">
            <a-asset-item id="avatar-model" src="avatar.glb"></a-asset-item>
            <a-asset-item id="glasses1-model" src="glasses1.glb"></a-asset-item>
            <a-asset-item id="glasses2-model" src="glasses2.glb"></a-asset-item>
        </a-assets>

        <a-entity 
            id="reticle" 
            ar-hit-test="doHitTest: true" 
            visible="false">
            <a-ring color="#00FF00" rotation="-90 0 0" radius-inner="0.08" radius-outer="0.12"></a-ring>
        </a-entity>

        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

</body>
</html>
